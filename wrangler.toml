name                   = "carat-cloud"
pages_build_output_dir = "public"
compatibility_date     = "2024-09-23"

# ── D1 Database ────────────────────────────────────────────────────────────
# 1. Run:  npm run db:create
# 2. Copy the "database_id" from the output and paste it below
# 3. Run:  npm run db:migrate        (applies schema locally)
# 4. Run:  npm run db:migrate:remote (applies schema in production)
[[d1_databases]]
binding      = "DB"
database_name = "carat-cloud-db"
database_id  = "YOUR_DATABASE_ID_HERE"   # ← replace after running db:create
